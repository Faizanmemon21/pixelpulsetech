<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="PixelPulse Tech builds high-performance custom gaming PCs powered by next-gen GPU architecture. Pick your framerate, not a plan name."
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>PixelPulse Tech · Next-Gen Gaming PCs</title>
    <!-- self-hosted variable fonts (latin subset, 91KB total), preloaded so
         text paints in its final font — no swap reflow (was our main CLS
         source), no render-blocking third-party CSS, no extra connections -->
    <link rel="preload" href="/fonts/orbitron-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2" crossorigin />
    <!-- hero model downloads in parallel but must not outrank fonts/JS/CSS —
         it's 1.4MB and never the LCP element (canvases don't count for LCP) -->
    <link rel="preload" href="/models/gaming-pc.glb" as="fetch" crossorigin fetchpriority="low" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
